<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataPulse — Dashboard Analityczny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <a class="logo-mark" href="#/">
                <div class="logo-dot">⚡</div>
                DataPulse
            </a>
        </div>

  <div class="nav-links">
    <div class="nav-section-label">Rynki</div>
    <a class="nav-link" data-route="crypto" onclick="navigate('crypto')">
      <span class="nav-icon">₿</span> Kryptowaluty
      <span class="nav-badge">LIVE</span>
    </a>
    <a class="nav-link" data-route="weather" onclick="navigate('weather')">
      <span class="nav-icon">🌡</span> Pogoda
    </a>
    <div class="nav-section-label">Analityka</div>
    <a class="nav-link" data-route="analytics" onclick="navigate('analytics')">
      <span class="nav-icon">📊</span> Analytics
    </a>
    <a class="nav-link" data-route="compare" onclick="navigate('compare')">
      <span class="nav-icon">⚖</span> Porównanie
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="user-avatar">G</div>
    <div class="user-info">
      <div class="user-name">Gość</div>
      <div class="user-role">Analityk</div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Przełącz motyw">☀️</button>
  </div>
</nav>


<div class="main">
  <header class="topbar">
    <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <div class="page-title" id="pageTitle">
      <span class="page-title-icon">₿</span>
      Kryptowaluty
    </div>
    <div class="topbar-right">
      <span class="last-update"><span class="live-dot"></span><span id="lastUpdateText">--:--:--</span></span>
      <button class="refresh-btn" id="refreshBtn" onclick="App.refresh()">
        <span class="btn-icon">↻</span> Odśwież
      </button>
    </div>
  </header>

  <div class="content" id="mainContent">

  </div>
</div>
</body>
</html>
<script src="./script.js"></script>
